<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Yield Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --background: #0a0f0a;
            --background-secondary: #0f1a0f;
            --foreground: #ffffff;
            --foreground-muted: #a3b8a3;
            --card: #121f12;
            --card-hover: #1a2d1a;
            --primary: #22ff66;
            --primary-dim: #1acc52;
            --primary-glow: rgba(34, 255, 102, 0.3);
            --accent: #00ff88;
            --accent-dim: #00cc6a;
            --border: #1f3d1f;
            --border-light: #2d5a2d;
            --shadow: rgba(34, 255, 102, 0.1);
            --shadow-intense: rgba(34, 255, 102, 0.25);
            --input-bg: #0f1a0f;
        }

        body {
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--foreground);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* SVG Background Pattern */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%231f3d1f' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 40px 30px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        /* Glowing Orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -150px;
            right: -100px;
        }

        .glow-orb-2 {
            width: 300px;
            height: 300px;
            background: var(--accent);
            bottom: -100px;
            left: -50px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeSlideDown 0.8s ease-out;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--foreground);
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--foreground-muted);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--foreground-muted);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .card-header-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .card-header h2 {
            font-size: 1.5rem;
            color: var(--foreground);
            font-weight: 600;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.95rem;
            color: var(--foreground-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            font-size: 1.2rem;
            color: var(--foreground-muted);
            pointer-events: none;
            z-index: 1;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--foreground);
            background: var(--input-bg);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: var(--foreground-muted);
            opacity: 0.6;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--primary);
            background: var(--background);
            box-shadow: 0 0 0 3px var(--shadow);
        }

        .form-select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2322ff66' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            padding-right: 45px;
        }

        .form-select option {
            background: var(--card);
            color: var(--foreground);
        }

        /* Animation classes */
        .card,
        .result-card,
        .form-group,
        .btn-predict {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.5s ease;
        }

        .card.show,
        .result-card.show,
        .form-group.show,
        .btn-predict.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-predict {
            width: 100%;
            padding: 18px 32px;
            background: var(--primary);
            color: var(--background);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 30px;
            box-shadow: 0 0 30px var(--primary-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-predict::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn-predict:hover::before {
            left: 100%;
        }

        .btn-predict:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 50px var(--shadow-intense), 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-predict:active {
            transform: translateY(-2px);
        }

        .btn-predict:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--primary));
        }

        .result-placeholder {
            text-align: center;
            color: var(--foreground-muted);
        }

        .result-placeholder-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-glow), transparent);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .result-placeholder-icon svg {
            width: 40px;
            height: 40px;
            stroke: var(--primary);
        }

        .result-placeholder p {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .result-content {
            display: none;
            text-align: center;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .result-content.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-icon-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 40px var(--primary-glow);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 40px var(--primary-glow); }
            50% { box-shadow: 0 0 60px var(--shadow-intense); }
        }

        .result-icon-large svg {
            width: 40px;
            height: 40px;
            stroke: var(--background);
        }

        .result-value {
            margin: 30px 0;
        }

        .result-value h2 {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-value p {
            font-size: 1rem;
            color: var(--foreground-muted);
        }

        .result-details {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
        }

        .result-detail-item {
            text-align: center;
        }

        .result-detail-label {
            font-size: 0.9rem;
            color: var(--foreground-muted);
            margin-bottom: 5px;
        }

        .result-detail-value {
            font-size: 1.1rem;
            color: var(--foreground);
            font-weight: 600;
        }

        .spinner {
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 20px 15px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .result-details {
                flex-direction: column;
                gap: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 25px;
            }
        }
    </style>
</head>

<body>
    <!-- Background Elements -->
    <div class="bg-pattern"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="container">
        <div class="header">
            <a href="/" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Home
            </a>
            <h1>Predict Your <span>Crop Yield</span></h1>
            <p>Enter your agricultural parameters below to get an accurate yield prediction</p>
        </div>

        <div class="main-grid">
            <!-- Input Parameters Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-header-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a0f0a" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h2>Input Parameters</h2>
                </div>

                <form id="predictionForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Region / Area</label>
                            <div class="input-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                                        <circle cx="12" cy="10" r="3"/>
                                    </svg>
                                </span>
                                <select name="area" id="area" class="form-select" required>
                                    <option value="">Select region</option>
                                    <option value="Albania">Albania</option>
                                    <option value="Algeria">Algeria</option>
                                    <option value="Angola">Angola</option>
                                    <option value="Argentina">Argentina</option>
                                    <option value="Armenia">Armenia</option>
                                    <option value="Australia">Australia</option>
                                    <option value="Austria">Austria</option>
                                    <option value="Bangladesh">Bangladesh</option>
                                    <option value="Belgium">Belgium</option>
                                    <option value="Brazil">Brazil</option>
                                    <option value="Canada">Canada</option>
                                    <option value="China">China</option>
                                    <option value="Egypt">Egypt</option>
                                    <option value="France">France</option>
                                    <option value="Germany">Germany</option>
                                    <option value="India">India</option>
                                    <option value="Indonesia">Indonesia</option>
                                    <option value="Italy">Italy</option>
                                    <option value="Japan">Japan</option>
                                    <option value="Kenya">Kenya</option>
                                    <option value="Mexico">Mexico</option>
                                    <option value="Netherlands">Netherlands</option>
                                    <option value="Nigeria">Nigeria</option>
                                    <option value="Pakistan">Pakistan</option>
                                    <option value="South Africa">South Africa</option>
                                    <option value="Spain">Spain</option>
                                    <option value="Sri Lanka">Sri Lanka</option>
                                    <option value="Thailand">Thailand</option>
                                    <option value="United Kingdom">United Kingdom</option>
                                    <option value="United States">United States</option>
                                    <option value="Zambia">Zambia</option>
                                    <option value="Zimbabwe">Zimbabwe</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Crop Type (Item)</label>
                            <div class="input-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M7 20h10M10 20c5.5-2.5 8-6 6-10-2 2-5.5 2.5-8 1-2.5-1.5-4.5-4-3-8 4 2 6 5 6 9"/>
                                    </svg>
                                </span>
                                <select name="item" id="item" class="form-select" required>
                                    <option value="">Select crop</option>
                                    <option value="Maize">Maize</option>
                                    <option value="Potatoes">Potatoes</option>
                                    <option value="Rice, paddy">Rice, paddy</option>
                                    <option value="Sorghum">Sorghum</option>
                                    <option value="Soybeans">Soybeans</option>
                                    <option value="Wheat">Wheat</option>
                                    <option value="Cassava">Cassava</option>
                                    <option value="Sweet potatoes">Sweet potatoes</option>
                                    <option value="Plantains and others">Plantains and others</option>
                                    <option value="Yams">Yams</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Year</label>
                            <div class="input-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                                        <path d="M16 2v4M8 2v4M3 10h18"/>
                                    </svg>
                                </span>
                                <input type="number" name="year" id="year" class="form-input" placeholder="e.g., 2025"
                                    min="1990" max="2030" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Avg. Rainfall (mm/year)</label>
                            <div class="input-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/>
                                    </svg>
                                </span>
                                <input type="number" name="rainfall" id="rainfall" class="form-input"
                                    placeholder="e.g., 1200" step="any" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Pesticides (tonnes)</label>
                            <div class="input-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M10 2v7.31M14 9.3V1.99M8.5 2h7M14 9.3a5 5 0 11-4 0"/>
                                        <path d="M5.52 16h12.96"/>
                                    </svg>
                                </span>
                                <input type="number" name="pesticides" id="pesticides" class="form-input"
                                    placeholder="e.g., 25.5" step="any" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Avg. Temperature (°C)</label>
                            <div class="input-wrapper">
                                <span class="input-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 14.76V3.5a2.5 2.5 0 00-5 0v11.26a4.5 4.5 0 105 0z"/>
                                    </svg>
                                </span>
                                <input type="number" name="avg_temp" id="avg_temp" class="form-input"
                                    placeholder="e.g., 28.5" step="any" required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-predict" id="submitBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 20V10M12 20V4M6 20v-6"/>
                        </svg>
                        <span id="btnText">Predict Yield</span>
                    </button>
                </form>
            </div>

            <!-- Prediction Result Card -->
            <div class="result-card">
                <div class="result-placeholder" id="resultPlaceholder">
                    <div class="result-placeholder-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                            <path d="M18 20V10M12 20V4M6 20v-6"/>
                        </svg>
                    </div>
                    <p>Fill in the parameters and click<br>predict to see results</p>
                </div>

                <div class="result-content" id="resultContent">
                    <div class="card-header" style="justify-content: center; margin-bottom: 20px;">
                        <div class="card-header-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a0f0a" stroke-width="2">
                                <path d="M18 20V10M12 20V4M6 20v-6"/>
                            </svg>
                        </div>
                        <h2>Prediction Result</h2>
                    </div>

                    <div class="result-icon-large">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>

                    <div class="result-value">
                        <h2 id="predictionValue">0</h2>
                        <p>hg/ha (hectograms per hectare)</p>
                    </div>

                    <div class="result-details">
                        <div class="result-detail-item">
                            <div class="result-detail-label">Crop</div>
                            <div class="result-detail-value" id="resultCrop">-</div>
                        </div>
                        <div class="result-detail-item">
                            <div class="result-detail-label">Region</div>
                            <div class="result-detail-value" id="resultRegion">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Form submission
        document.getElementById('predictionForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const resultPlaceholder = document.getElementById('resultPlaceholder');
            const resultContent = document.getElementById('resultContent');

            // Get form values
            const area = document.getElementById('area').value;
            const item = document.getElementById('item').value;
            const year = parseInt(document.getElementById('year').value);
            const rainfall = parseFloat(document.getElementById('rainfall').value);
            const pesticides = parseFloat(document.getElementById('pesticides').value);
            const avgTemp = parseFloat(document.getElementById('avg_temp').value);

            // Show loading state
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner" style="display:inline-block">&#10227;</span> Analyzing...';

            try {
                // Call your Flask backend
                const response = await fetch('/predict_data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        area,
                        item,
                        year,
                        rainfall,
                        pesticides,
                        avg_temp: avgTemp
                    })
                });

                const data = await response.json();
                const prediction = data.prediction;

                // Display result
                document.getElementById('predictionValue').textContent = prediction.toLocaleString();
                document.getElementById('resultCrop').textContent = item;
                document.getElementById('resultRegion').textContent = area;

                // Show result
                resultPlaceholder.style.display = 'none';
                resultContent.classList.add('show');

            } catch (error) {
                console.error('Error:', error);
                alert('Error making prediction. Please try again.');
            } finally {
                // Reset button
                submitBtn.disabled = false;
                btnText.innerHTML = 'Predict Yield';
            }
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const elements = document.querySelectorAll(
                ".card, .result-card, .form-group, .btn-predict"
            );

            const observer = new IntersectionObserver((entries) => {

                entries.forEach(entry => {

                    if (entry.isIntersecting) {
                        const index = [...elements].indexOf(entry.target);

                        setTimeout(() => {
                            entry.target.classList.add("show");
                        }, index * 150);

                    } else {
                        entry.target.classList.remove("show");
                    }

                });

            }, { threshold: 0.2 });

            elements.forEach(el => observer.observe(el));
        });
    </script>

</body>

</html>
